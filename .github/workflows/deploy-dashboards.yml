name: Deploy dashboards

# Builds the pipeline from the committed fixture and publishes the Evidence
# site to GitHub Pages:
#   load fixture -> dbt build -> evidence build -> Pages
#
# One-time setup: repo Settings -> Pages -> Source = "GitHub Actions".
on:
  push:
    branches: [main]
    paths:
      - "models/**"
      - "macros/**"
      - "dashboards/**"
      - "data/raw/**"
      - "load.py"
      - "dbt_project.yml"
      - "profiles.yml"
      - "packages.yml"
      - "requirements.txt"
      - ".github/workflows/deploy-dashboards.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  DBT_PROFILES_DIR: .

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- 1. Build the warehouse from the committed fixture --------------
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install python deps
        run: pip install -r requirements.txt

      - name: dbt deps
        run: dbt deps

      # load.py default --db now points at the subdir file (matches profiles.yml
      # dev target), so no --db needed. Reads data/raw fixture -> deterministic.
      - name: Load fixture into DuckDB
        run: python load.py

      - name: dbt build
        run: dbt build

      # ---- 2. Build the Evidence static site -----------------------------
      # dbt already built the warehouse in place at
      # dashboards/sources/telehealth/telehealth.duckdb (where connection.yaml
      # expects it), so no copy step is needed.
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboards/package-lock.json

      - name: Install Evidence
        working-directory: dashboards
        run: npm ci

      - name: Inject Base Path into Config
        working-directory: dashboards
        run: |
          touch evidence.config.yaml
          yq -i '.deployment.basePath = "/${{ github.event.repository.name }}"' evidence.config.yaml
          cat evidence.config.yaml

      - name: Check Evidence queries only read serving layer
        working-directory: dashboards
        run: |
          if grep -rnIE '\b(raw|staging|intermediate)\.' sources/ pages/ ; then
            echo "❌ ERROR: Architecture Violation!"
            echo "Evidence queries may read the serving layer only (e.g., marts)."
            exit 1
          fi

      - name: Build sources + site
        working-directory: dashboards
        env:
          EVIDENCE_BUILD_DIR: "./build/${{ github.event.repository.name }}"
        run: |
          npm run sources
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "dashboards/build/${{ github.event.repository.name }}"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
